# llama-server router preset (Linux).  Adapted from countzero/windows_llama.cpp.
#
# One [section] per model. The section header is the name clients pass in the
# OpenAI-compatible "model" field. Keys are llama-server flags WITHOUT the
# leading "--"  (see:  llama-server --help  for every available flag).
#
# Setup:
#   cp presets/models.example.ini presets/models.ini
#   sed -i "s|/home/USER|$HOME|g" presets/models.ini
#
# Model paths must be ABSOLUTE and point INSIDE $LLAMA_MODELS_DIR (outside the
# repo). ctx-size / n-gpu-layers below are conservative defaults — raise them to
# fit your VRAM. n-gpu-layers = 999 offloads all layers (clamped automatically).

[Qwen3.6-27B-IQ4_XS-mtp.gguf]
alias = Qwen3.6-27B-IQ4_XS-mtp.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen3.6-27B/Qwen3.6-27B-IQ4_XS-mtp.gguf
ctx-size = 32768
n-gpu-layers = 999
flash-attn = auto
jinja = true
# Optional: override a buggy embedded chat template (fetch via models.list):
# chat-template-file = /home/USER/.local/share/llama.cpp/templates/chat_template.jinja

[Qwen3.6-35B-A3B-MTP-IQ4_XS.gguf]
alias = Qwen3.6-35B-A3B-MTP-IQ4_XS.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen3.6-35B-A3B/Qwen3.6-35B-A3B-MTP-IQ4_XS.gguf
ctx-size = 32768
n-gpu-layers = 999
flash-attn = auto
jinja = true

[gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf]
alias = gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
model = /home/USER/.local/share/llama.cpp/models/gemma-4-26B-A4B/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
ctx-size = 32768
n-gpu-layers = 999
flash-attn = auto
jinja = true
