# llama-server router preset (Linux).  Adapted from countzero/windows_llama.cpp.
#
# One [section] per model. The section header is the name clients pass in the
# OpenAI-compatible "model" field. Keys are llama-server flags WITHOUT the
# leading "--"  (see:  llama-server --help  for every available flag).
#
# Setup:
#   cp presets/models.example.ini presets/models.ini
#   sed -i "s|/home/USER|$HOME|g" presets/models.ini
#
# Model paths must be ABSOLUTE and point INSIDE $LLAMA_MODELS_DIR (outside the
# repo). ctx-size / n-gpu-layers below are conservative defaults — raise them to
# fit your VRAM. n-gpu-layers = 999 offloads all layers (clamped automatically).

[Qwen3.6-27B-IQ4_XS-mtp.gguf]
alias = Qwen3.6-27B-IQ4_XS-mtp.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen3.6-27B/Qwen3.6-27B-IQ4_XS-mtp.gguf
ctx-size = 32768
n-gpu-layers = 999
flash-attn = auto
jinja = true
# Optional: override a buggy embedded chat template (fetch via models.list):
# chat-template-file = /home/USER/.local/share/llama.cpp/templates/chat_template.jinja

[Qwen3.6-35B-A3B-MTP-IQ4_XS.gguf]
alias = Qwen3.6-35B-A3B-MTP-IQ4_XS.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen3.6-35B-A3B/Qwen3.6-35B-A3B-MTP-IQ4_XS.gguf
ctx-size = 32768
n-gpu-layers = 999
flash-attn = auto
jinja = true

[gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf]
alias = gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
model = /home/USER/.local/share/llama.cpp/models/gemma-4-26B-A4B/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
ctx-size = 32768
n-gpu-layers = 999
flash-attn = auto
jinja = true

# --- Ornith-1.0 (DeepReinforce) — agentic coding ---------------------------
# Architecture: qwen35 (9B dense), qwen3_5_moe (35B MoE). Reasoning model;
# llama-server >= b5800 surfaces <think> blocks as reasoning_content when
# --jinja is enabled. Tool-calling via the model's <tool_call> blocks works
# out-of-the-box with --jinja on recent llama.cpp builds.

# 9B dense @ Q8_0 (9.53 GB weights): fits fully in 24 GB VRAM together with
# a 262k-token KV-cache at q8_0 (~9 GB). Fast (~60+ t/s expected on 7900 XTX).
[ornith-1.0-9b-Q8_0.gguf]
alias = ornith-1.0-9b-Q8_0.gguf
model = /home/USER/.local/share/llama.cpp/models/Ornith-1.0-9B/ornith-1.0-9b-Q8_0.gguf
ctx-size = 262144
n-gpu-layers = 999
flash-attn = auto
cache-type-k = q8_0
cache-type-v = q8_0
jinja = true

# 35B MoE @ Q4_K_M (20.2 GB weights, qwen35moe arch). On a 24 GB GPU, all
# weights fit fully on-device; q8_0 KV-cache makes even very large contexts
# numerically fit (~2 GB @ 192k tokens vs ~4 GB at f16). Pure GPU = full
# throughput; only raise n-cpu-moe as a last resort if OOM (each step pushes
# ~1 expert layer to CPU and slows prompt processing). If OOM, drop ctx-size
# to 131072 first. Sampling: vendor (Qwen3-style) recommends temp=0.6,
# top-p=0.95, top-k=20. Use `.claude/skills/llama-preset/scripts/recommend.sh`
# to fit ctx-size / n-gpu-layers / n-cpu-moe to your specific GPU.
[ornith-1.0-35b-Q4_K_M.gguf]
alias = ornith-1.0-35b-Q4_K_M.gguf
model = /home/USER/.local/share/llama.cpp/models/Ornith-1.0-35B/ornith-1.0-35b-Q4_K_M.gguf
ctx-size = 131072
n-gpu-layers = 999
flash-attn = auto
cache-type-k = q8_0
cache-type-v = q8_0
jinja = true
temp = 0.6
top-p = 0.95
top-k = 20
