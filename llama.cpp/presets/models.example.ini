# llama-server router preset (Linux).  Adapted from countzero/windows_llama.cpp.
#
# One [section] per model. The section header is the name clients pass in the
# OpenAI-compatible "model" field. Keys are llama-server flags WITHOUT the
# leading "--"  (see:  llama-server --help  for every available flag).
#
# Setup:
#   cp presets/models.example.ini presets/models.ini
#   sed -i "s|/home/USER|$HOME|g" presets/models.ini
#
# Model paths must be ABSOLUTE and point INSIDE $LLAMA_MODELS_DIR (outside the
# repo). ctx-size / n-gpu-layers below are conservative defaults — raise them to
# fit your VRAM. n-gpu-layers = 999 offloads all layers (clamped automatically).

[Qwen3.6-27B]
alias = Qwen3.6-27B-IQ4_XS.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen3.6-27B/Qwen3.6-27B-IQ4_XS.gguf
ctx-size = 131072
n-gpu-layers = 99
cache-type-k = q8_0
cache-type-v = q8_0
flash-attn = auto
jinja = true
parallel = 1
spec-type = draft-mtp
spec-draft-n-max = 2
# Optional: override a buggy embedded chat template (fetch via models.list):
# chat-template-file = /home/USER/.local/share/llama.cpp/templates/chat_template.jinja

[Qwen3.6-35B-A3B]
alias = Qwen3.6-35B-A3B-UD-IQ4_XS.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen3.6-35B-A3B/Qwen3.6-35B-A3B-UD-IQ4_XS.gguf
ctx-size = 200000
n-gpu-layers = 99
cache-type-k = q8_0
cache-type-v = q8_0
flash-attn = auto
jinja = true
parallel = 1
cache-reuse = 256

[gemma-4-26B-A4B]
alias = gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
model = /home/USER/.local/share/llama.cpp/models/gemma-4-26B-A4B/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
ctx-size = 262144
n-gpu-layers = 99
cache-type-k = q8_0
cache-type-v = q8_0
flash-attn = on
jinja = true
temp = 1.0
top-p = 0.95
top-k = 64
prio = 2
parallel = 1

# --- Gemma 4 31B (Google/unsloth, Apache-2.0) — dense QAT model -------------
# Dense 31B, arch gemma4, 60 layers, native 256K context. Hybrid attention
# interleaves local sliding-window (1024) layers with periodic global layers;
# the global layers use unified Keys/Values + Proportional RoPE, so the growing
# KV-cache lives in only the few global layers and long contexts stay cheap on
# VRAM. QAT (quantization-aware training) UD-Q4_K_XL (17.3 GB) keeps near-bf16
# quality; with the ~280 MB MTP drafter it fits fully on a 24 GB GPU — pin
# device=Vulkan0 to keep it off an integrated GPU. MTP speculative decoding
# (spec-type=draft-mtp + model-draft = the mtp-*.gguf) is lossless (the target
# verifies every drafted token) and speeds up generation. If you OOM, drop
# ctx-size to 131072 first, keep q8_0 KV. Sampling per model card: temp=1.0,
# top-p=0.95, top-k=64; thinking is opt-in via a <|think|> token in the system
# prompt. Text+Image is available by adding an mmproj (see commented key).
[gemma-4-31B]
alias = gemma-4-31B-it-qat-UD-Q4_K_XL.gguf
model = /home/USER/.local/share/llama.cpp/models/gemma-4-31B/gemma-4-31B-it-qat-UD-Q4_K_XL.gguf
device = Vulkan0
ctx-size = 262144
n-gpu-layers = 999
model-draft = /home/USER/.local/share/llama.cpp/models/gemma-4-31B/mtp-gemma-4-31B-it.gguf
spec-type = draft-mtp
spec-draft-n-max = 4
cache-type-k = q8_0
cache-type-v = q8_0
flash-attn = auto
jinja = true
parallel = 1
temp = 1.0
top-p = 0.95
top-k = 64
# Optional vision (Text+Image): fetch mmproj-F16.gguf via models.list, then set:
# mmproj = /home/USER/.local/share/llama.cpp/models/gemma-4-31B/mmproj-F16.gguf

# --- Ornith-1.0 (DeepReinforce) — agentic coding ---------------------------
# Architecture: qwen35 (9B dense), qwen3_5_moe (35B MoE). Reasoning model;
# llama-server >= b5800 surfaces <think> blocks as reasoning_content when
# --jinja is enabled. Tool-calling via the model's <tool_call> blocks works
# out-of-the-box with --jinja on recent llama.cpp builds.

# 9B dense @ Q8_0 (9.53 GB weights): fits fully in 24 GB VRAM together with
# a 262k-token KV-cache at q8_0 (~9 GB). Fast (~60+ t/s expected on 7900 XTX).
[Ornith-1.0-9B]
alias = ornith-1.0-9b-Q8_0.gguf
model = /home/USER/.local/share/llama.cpp/models/Ornith-1.0-9B/ornith-1.0-9b-Q8_0.gguf
ctx-size = 262144
n-gpu-layers = 99
cache-type-k = q8_0
cache-type-v = q8_0
flash-attn = on
jinja = true
parallel = 1
temp = 0.6
top-p = 0.95
top-k = 20

# 35B MoE @ Q4_K_M (20.2 GB weights, qwen35moe arch). On a 24 GB GPU, all
# weights fit fully on-device; q8_0 KV-cache makes even very large contexts
# numerically fit (~2 GB @ 192k tokens vs ~4 GB at f16). Pure GPU = full
# throughput; only raise n-cpu-moe as a last resort if OOM (each step pushes
# ~1 expert layer to CPU and slows prompt processing). If OOM, drop ctx-size
# to 131072 first. Sampling: vendor (Qwen3-style) recommends temp=0.6,
# top-p=0.95, top-k=20. Use `.claude/skills/llama-preset/scripts/recommend.sh`
# to fit ctx-size / n-gpu-layers / n-cpu-moe to your specific GPU.
[Ornith-1.0-35B]
alias = ornith-1.0-35b-Q4_K_M.gguf
model = /home/USER/.local/share/llama.cpp/models/Ornith-1.0-35B/ornith-1.0-35b-Q4_K_M.gguf
ctx-size = 131072
n-gpu-layers = 99
cache-type-k = q8_0
cache-type-v = q8_0
flash-attn = on
jinja = true
temp = 0.6
top-p = 0.95
top-k = 20

# --- Qwen-AgentWorld (Qwen, Apache-2.0) — language world model -------------
# 35B-A3B MoE, arch qwen35moe (base: Qwen3.5-35B-A3B). Hybrid attention layout
# 10 × (3 × Gated-DeltaNet → 1 × Gated-Attention): only ~10 of 40 layers carry a
# growing KV-cache, so very long contexts are cheap on VRAM. Trained as a *world
# model* to simulate 7 agent environments (MCP/Search/Terminal/SWE/Android/Web/
# OS) via long chain-of-thought; thinking mode (<think>…</think>) is on by
# default, hence jinja=true (surfaces reasoning_content + tool calls). Domain-
# specific world-model system prompts live in the QwenLM/Qwen-AgentWorld repo.
#
# UD-IQ4_XS (17.8 GB) fits fully on the 24 GB 7900 XTX — pin device=Vulkan0 to
# keep it off the Intel iGPU (Vulkan1). Vendor advises ctx ≥128K for multi-turn
# simulation; with q8_0 KV the native 262k context fits numerically. If you OOM
# in practice, drop ctx-size to 131072 first. Sampling per model card:
# temp=0.6, top-p=0.95, top-k=20.
[Qwen-AgentWorld-35B-A3B]
alias = Qwen-AgentWorld-35B-A3B-UD-IQ4_XS.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen-AgentWorld-35B-A3B/Qwen-AgentWorld-35B-A3B-UD-IQ4_XS.gguf
ctx-size = 262144
n-gpu-layers = 999
cache-type-k = q8_0
cache-type-v = q8_0
flash-attn = auto
jinja = true
parallel = 1
temp = 0.6
top-p = 0.95
top-k = 20

# --- Unlimited-OCR (Baidu, MIT) — 3B VLM, document parsing -----------------
# DeepSeek-OCR architecture; requires the F16 vision projector via `mmproj`.
# Per PR #17400 maintainer: do NOT set `chat-template = deepseek-ocr` here —
# the embedded Jinja template handles it. Clients send images as base64
# `image_url` parts in the OpenAI /v1/chat/completions schema. Useful prompts:
# "OCR", "OCR markdown", "<|grounding|>OCR" (last one returns bounding boxes).
# Quant Q4_K_M (1.95 GB) + mmproj F16 (812 MB) fits comfortably on any modern
# dGPU; ctx 8192 is enough for one page, raise for very dense documents.
# `repeat-penalty = 1.1` + `predict = 4096` curb the DeepSeek-OCR endless
# `text [x,y,x,y]` loop seen when special tokens are skipped by the client UI.
[Unlimited-OCR]
alias = Unlimited-OCR
model = /home/USER/.local/share/llama.cpp/models/Unlimited-OCR/Unlimited-OCR-Q8_0.gguf
mmproj = /home/USER/.local/share/llama.cpp/models/Unlimited-OCR/mmproj-Unlimited-OCR-F16.gguf
ctx-size = 32768
n-gpu-layers = 999
flash-attn = auto
temp = 0
top-k = 1
repeat-penalty = 1.1
parallel = 1
