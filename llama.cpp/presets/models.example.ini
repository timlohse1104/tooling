# llama-server router preset (Linux).  Adapted from countzero/windows_llama.cpp.
#
# One [section] per model. The section header is the name clients pass in the
# OpenAI-compatible "model" field. Keys are llama-server flags WITHOUT the
# leading "--"  (see:  llama-server --help  for every available flag).
#
# Setup:
#   cp presets/models.example.ini presets/models.ini
#   sed -i "s|/home/USER|$HOME|g" presets/models.ini
#
# Model paths must be ABSOLUTE and point INSIDE $LLAMA_MODELS_DIR (outside the
# repo). n-gpu-layers = 999 offloads all layers (clamped automatically).
#
# ctx-size / n-gpu-layers / n-cpu-moe / cache-type-k/v below are VERIFIED for
# the reference hardware this repo targets (AMD RX 7900 XTX, 24560 MiB VRAM,
# see llama.cpp/README.md + AGENTS.md) via
# `.claude/skills/llama-preset/scripts/recommend.sh` — each was actually probed
# with llama-fit-params (not guessed from file size), and cache-type-k=q8_0 /
# cache-type-v=q4_0 + parallel=1 + cache-reuse + reasoning-format=auto are its
# agentic quality/speed defaults (see the skill's SKILL.md). On different
# hardware (or after a llama.cpp/driver update), re-run that skill per model;
# it prints an OPTIMIZATION DIFF against whatever is already in your models.ini.

# Dense 27B (arch qwen3_6, 66 layers, native 262144 ctx). Fits fully at native
# ctx with q8_0/q4_0 KV (~21.6 GB of the ~23 GB usable budget on a 24 GB card).
# HF repo is an "-MTP-" build (unsloth/Qwen3.6-27B-MTP-GGUF) — the MTP head is
# embedded in this same GGUF, so speculative decoding needs no separate
# model-draft file.
[Qwen3.6-27B]
alias = Qwen3.6-27B-IQ4_XS.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen3.6-27B/Qwen3.6-27B-IQ4_XS.gguf
device = Vulkan0
ctx-size = 262144
n-gpu-layers = 999
cache-type-k = q8_0
cache-type-v = q4_0
flash-attn = auto
jinja = true
reasoning-format = auto
parallel = 1
cache-reuse = 256
spec-type = draft-mtp
spec-draft-n-max = 4
# Optional: override a buggy embedded chat template (fetch via models.list):
# chat-template-file = /home/USER/.local/share/llama.cpp/templates/chat_template.jinja

# 35B-A3B MoE (arch qwen35moe, 42 layers, native 262144 ctx). Fits fully with
# all experts on GPU (~19.7 GB of ~23 GB budget). HF repo is also an "-MTP-"
# build (unsloth/Qwen3.6-35B-A3B-MTP-GGUF) — embedded self-speculative head,
# same as Qwen3.6-27B above.
[Qwen3.6-35B-A3B]
alias = Qwen3.6-35B-A3B-UD-IQ4_XS.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen3.6-35B-A3B/Qwen3.6-35B-A3B-UD-IQ4_XS.gguf
device = Vulkan0
ctx-size = 262144
n-gpu-layers = 999
cache-type-k = q8_0
cache-type-v = q4_0
flash-attn = auto
jinja = true
reasoning-format = auto
parallel = 1
cache-reuse = 256
spec-type = draft-mtp
spec-draft-n-max = 4

# 26B-A4B MoE (arch gemma4moe, 31 layers, native 262144 ctx). Fits fully
# (~16.3 GB of ~23 GB budget). No MTP build exists for this repo, hence no
# spec-type. Sampling per model card: temp=1.0, top-p=0.95, top-k=64.
[gemma-4-26B-A4B]
alias = gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
model = /home/USER/.local/share/llama.cpp/models/gemma-4-26B-A4B/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
device = Vulkan0
ctx-size = 262144
n-gpu-layers = 999
cache-type-k = q8_0
cache-type-v = q4_0
flash-attn = on
jinja = true
reasoning-format = auto
temp = 1.0
top-p = 0.95
top-k = 64
prio = 2
parallel = 1
cache-reuse = 256

# --- Gemma 4 31B (Google/unsloth, Apache-2.0) — dense QAT model -------------
# Dense 31B, arch gemma4, 61 layers, native 262144 ctx. Hybrid attention
# interleaves local sliding-window (1024) layers with periodic global layers;
# the global layers use unified Keys/Values + Proportional RoPE, so the growing
# KV-cache lives in only the few global layers and long contexts stay cheap on
# VRAM. QAT (quantization-aware training) UD-Q4_K_XL (~16.1 GB) keeps near-bf16
# quality — pin device=Vulkan0 to keep it off the integrated GPU. MTP
# speculative decoding (spec-type=draft-mtp + model-draft = the mtp-*.gguf) is
# lossless (the target verifies every drafted token). VERIFIED: the model +
# its ~266 MB MTP drafter (which llama-fit-params cannot size on its own — it
# has no standalone --model-draft support and the drafter can't even load
# without the target's context) do NOT both fit at the native 262144 ctx;
# ctx-size = 163840 is the largest that actually fits with q8_0/q4_0 KV,
# confirmed via llama-preset. Sampling per model card: temp=1.0, top-p=0.95,
# top-k=64; thinking is opt-in via a <|think|> token in the system prompt.
# Text+Image is available by adding an mmproj (see commented key).
[gemma-4-31B]
alias = gemma-4-31B-it-qat-UD-Q4_K_XL.gguf
model = /home/USER/.local/share/llama.cpp/models/gemma-4-31B/gemma-4-31B-it-qat-UD-Q4_K_XL.gguf
device = Vulkan0
ctx-size = 163840
n-gpu-layers = 999
model-draft = /home/USER/.local/share/llama.cpp/models/gemma-4-31B/mtp-gemma-4-31B-it.gguf
spec-type = draft-mtp
spec-draft-n-max = 4
cache-type-k = q8_0
cache-type-v = q4_0
flash-attn = on
jinja = true
reasoning-format = auto
parallel = 1
cache-reuse = 256
temp = 1.0
top-p = 0.95
top-k = 64
# Optional vision (Text+Image): fetch mmproj-F16.gguf via models.list, then set:
# mmproj = /home/USER/.local/share/llama.cpp/models/gemma-4-31B/mmproj-F16.gguf

# --- Ornith-1.0 (DeepReinforce) — agentic coding ---------------------------
# Architecture: qwen3_5 (9B dense), qwen3_5_moe (35B MoE). Reasoning model;
# llama-server surfaces <think> blocks as reasoning_content when
# --jinja/reasoning-format is enabled. Tool-calling via the model's
# <tool_call> blocks works out-of-the-box.

# 9B dense (33 layers, native 262144 ctx). VERIFIED: fits fully with huge
# headroom (~11.9 GB of ~23 GB budget) — fastest model in this preset.
[Ornith-1.0-9B]
alias = ornith-1.0-9b-Q8_0.gguf
model = /home/USER/.local/share/llama.cpp/models/Ornith-1.0-9B/ornith-1.0-9b-Q8_0.gguf
device = Vulkan0
ctx-size = 262144
n-gpu-layers = 999
cache-type-k = q8_0
cache-type-v = q4_0
flash-attn = on
jinja = true
reasoning-format = auto
parallel = 1
cache-reuse = 256
temp = 0.6
top-p = 0.95
top-k = 20

# 35B MoE (Q4_K_M, arch qwen3_5_moe, 41 layers, native 262144 ctx). VERIFIED:
# fits fully at native ctx with q8_0/q4_0 KV, but VERY TIGHT (~22.8 GB of
# ~23 GB budget, only ~750 MiB headroom) — verify by actually loading before
# relying on this in production; drop ctx-size if the real load OOMs (compute
# buffer sizes can vary slightly with client request patterns). Sampling:
# vendor (Qwen3-style) recommends temp=0.6, top-p=0.95, top-k=20.
[Ornith-1.0-35B]
alias = ornith-1.0-35b-Q4_K_M.gguf
model = /home/USER/.local/share/llama.cpp/models/Ornith-1.0-35B/ornith-1.0-35b-Q4_K_M.gguf
device = Vulkan0
ctx-size = 262144
n-gpu-layers = 999
cache-type-k = q8_0
cache-type-v = q4_0
flash-attn = on
jinja = true
reasoning-format = auto
parallel = 1
cache-reuse = 256
temp = 0.6
top-p = 0.95
top-k = 20

# --- Qwen-AgentWorld (Qwen, Apache-2.0) — language world model -------------
# 35B-A3B MoE, arch qwen35moe (base: Qwen3.5-35B-A3B). Hybrid attention layout
# 10 × (3 × Gated-DeltaNet → 1 × Gated-Attention): only ~10 of 40 layers carry a
# growing KV-cache, so very long contexts are cheap on VRAM. Trained as a *world
# model* to simulate 7 agent environments (MCP/Search/Terminal/SWE/Android/Web/
# OS) via long chain-of-thought; thinking mode (<think>…</think>) is on by
# default, hence jinja=true (surfaces reasoning_content + tool calls). Domain-
# specific world-model system prompts live in the QwenLM/Qwen-AgentWorld repo.
#
# VERIFIED: fits fully at native 262144 ctx with q8_0/q4_0 KV (~19.3 GB of
# ~23 GB budget) — pin device=Vulkan0 to keep it off the Intel iGPU (Vulkan1).
# No MTP build exists for this repo, hence no spec-type. Sampling per model
# card: temp=0.6, top-p=0.95, top-k=20.
[Qwen-AgentWorld-35B-A3B]
alias = Qwen-AgentWorld-35B-A3B-UD-IQ4_XS.gguf
model = /home/USER/.local/share/llama.cpp/models/Qwen-AgentWorld-35B-A3B/Qwen-AgentWorld-35B-A3B-UD-IQ4_XS.gguf
device = Vulkan0
ctx-size = 262144
n-gpu-layers = 999
cache-type-k = q8_0
cache-type-v = q4_0
flash-attn = auto
jinja = true
reasoning-format = auto
parallel = 1
cache-reuse = 256
temp = 0.6
top-p = 0.95
top-k = 20

# --- Unlimited-OCR (Baidu, MIT) — 3B VLM, document parsing -----------------
# DeepSeek-OCR architecture; requires the F16 vision projector via `mmproj`.
# Per PR #17400 maintainer: do NOT set `chat-template = deepseek-ocr` here —
# the embedded Jinja template handles it. Clients send images as base64
# `image_url` parts in the OpenAI /v1/chat/completions schema. Useful prompts:
# "OCR", "OCR markdown", "<|grounding|>OCR" (last one returns bounding boxes).
# `repeat-penalty = 1.1` curbs the DeepSeek-OCR endless `text [x,y,x,y]` loop
# seen when special tokens are skipped by the client UI.
#
# Excluded from the agentic tuning above (see llama-preset's OCR exception):
# f16 KV / no parallel-reuse / no speculative decoding, deterministic sampling
# (temp=0, top-k=1) — one-shot greedy grounding, not multi-turn agent use.
# VERIFIED: fits fully at native 32768 ctx with huge headroom (~5 GB of
# ~23 GB budget); raise ctx-size for very dense multi-page documents.
[Unlimited-OCR]
alias = Unlimited-OCR
model = /home/USER/.local/share/llama.cpp/models/Unlimited-OCR/Unlimited-OCR-Q8_0.gguf
mmproj = /home/USER/.local/share/llama.cpp/models/Unlimited-OCR/mmproj-Unlimited-OCR-F16.gguf
device = Vulkan0
ctx-size = 32768
n-gpu-layers = 999
flash-attn = auto
temp = 0
top-k = 1
repeat-penalty = 1.1
parallel = 1
